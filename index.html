<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hub - YourDomain</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    .logo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      margin: 0 auto 20px;
      background: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .link-btn {
      display: block;
      padding: 16px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .link-btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    footer {
      margin-top: 30px;
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo">H</div>

    <h1>Hub.YourDomain.com</h1>
    <p>Alle belangrijke links op één plek.</p>

    <div class="links">
      <a class="link-btn" href="https://link1.nl" target="_blank">Link 1</a>
      <a class="link-btn" href="https://link2.nl" target="_blank">Link 2</a>
      <a class="link-btn" href="https://link3.nl" target="_blank">Link 3</a>
      <a class="link-btn" href="https://link4.nl" target="_blank">Link 4</a>
      <a class="link-btn" href="https://link5.nl" target="_blank">Link 5</a>
      <a class="link-btn" href="https://link6.nl" target="_blank">Link 6</a>
      <a class="link-btn" href="https://link7.nl" target="_blank">Link 7</a>
      <a class="link-btn" href="https://link8.nl" target="_blank">Link 8</a>
      <a class="link-btn" href="https://link9.nl" target="_blank">Link 9</a>
      <a class="link-btn" href="https://link10.nl" target="_blank">Link 10</a>
    </div>

    <footer>
      © 2026 YourDomain.com
    </footer>

  </div>

</body>
</html>
